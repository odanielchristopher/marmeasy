name: Marmeasy CI

on:
  push:
    branches: [main, homolog, developer]
  pull_request:
    branches: [main, homolog, developer]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Use Node.js 20.x
      uses: actions/setup-node@v3
      with:
        node-version: '20.x'
        cache: 'npm'

    - name: Cache dependencies
      uses: actions/cache@v3
      with:
        path: |
          api/node_modules
          front/node_modules
        key: ${{ runner.os }}-marmeasy-${{ hashFiles('**/package-lock.json') }}
        restore-keys: |
          ${{ runner.os }}-marmeasy-

    - name: Install dependencies
      run: |
        npm ci --prefix api
        npm ci --prefix front

    - name: Linting
      run: |
        npm run prettier:check --prefix api
        npm run eslint:check --prefix api
        npm run prettier:check --prefix front
        npm run eslint:check --prefix front

    - name: Typecheck
      run: |
        npm run typecheck --prefix api
        npm run typecheck --prefix front
