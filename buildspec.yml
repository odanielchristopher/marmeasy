version: 0.2

phases:
  install:
    runtime_versions:
      nodejs: 20
    commands:
      - echo "Instalando NestJS CLI globalmente..."
      - npm install -g @nestjs/cli
      - echo "Instalando Docker..."
      - curl -fsSL https://get.docker.com | sh
      - docker --version

  pre_build:
    commands:
      - echo "Autenticando no Docker ECR..."
      - aws ecr get-login-password --region $AWS_REGION | docker login --username AWS --password-stdin $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com

  build:
    commands:
      - echo "Criando arquivo .env na API..."
      - cd api
      - echo "POSTGRES_USER=$POSTGRES_USER" >> .env
      - echo "POSTGRES_PASSWORD=$POSTGRES_PASSWORD" >> .env
      - echo "POSTGRES_DB=$POSTGRES_DB" >> .env
      - echo "API_PORT=$API_PORT" >> .env
      - echo "Variáveis de ambiente injetadas com sucesso!"

      - echo "Iniciando a construção da API..."
      - cd api
      - echo "Rodando Prisma Migrations..."
      - npx prisma migrate deploy
      - echo "Iniciando Docker Compose..."
      - docker compose up --build -d
      - docker ps

  post_build:
    commands:
      - echo "Build finalizado com sucesso!"
